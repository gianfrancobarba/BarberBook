# ── Profilo PRODUZIONE ────────────────────────────────────────────────────────
# Caricato quando SPRING_PROFILES_ACTIVE=prod
# TUTTI i valori sensibili devono provenire da variabili d'ambiente

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

# JWT: secret da variabile d'ambiente — minimo 64 caratteri in produzione
jwt:
  secret: ${JWT_SECRET}

# ── Logging in produzione: solo WARN e ERROR ──────────────────────────────────
logging:
  level:
    root: WARN
    com.barberbook: INFO
    org.springframework.security: WARN
    org.flywaydb: WARN

# ── App URL per link email (produzione) ───────────────────────────────────────
app:
  base-url: ${APP_BASE_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

# ── Disabilita stack trace nelle response HTTP ────────────────────────────────
server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
