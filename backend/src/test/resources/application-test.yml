# ── Profilo TEST ─────────────────────────────────────────────────────────────
# Usato da Testcontainers — il DB reale viene avviato nel container
# Le proprietà datasource vengono sovrascrite dinamicamente
# da @DynamicPropertySource nei test di integrazione

spring:
  datasource:
    # Placeholder — sovrascritta da DynamicPropertySource nei test
    url: jdbc:postgresql://localhost:5432/barberbook_test
    username: test
    password: test

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate   # Flyway gestisce lo schema anche in test

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false   # Permette flyway:clean nei test (utile per reset stato)

# JWT: secret di test — non usare in produzione
jwt:
  secret: test_secret_key_minimum_32_chars_for_testing_purposes_only

logging:
  level:
    com.barberbook: INFO
    org.flywaydb: WARN
    org.hibernate.SQL: WARN
