# BarberBook SonarCloud Configuration
sonar.projectKey=gianfrancobarba_BarberBook
sonar.organization=gianfrancobarba
sonar.host.url=https://sonarcloud.io

# Source paths
# Since this is the root, we point to backend sources
sonar.sources=backend/src/main/java
sonar.tests=backend/src/test/java
sonar.java.binaries=backend/target/classes

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage configuration
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Exclusions
sonar.exclusions=backend/src/main/java/com/barberbook/dto/**, \
                 backend/src/main/java/com/barberbook/config/**, \
                 backend/src/main/java/com/barberbook/domain/enums/**, \
                 backend/src/main/java/com/barberbook/BarberBookApplication.java, \
                 backend/src/main/java/com/barberbook/mapper/**/*Impl.java
